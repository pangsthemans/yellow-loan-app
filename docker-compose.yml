version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: yellow
      POSTGRES_PASSWORD: yellow
      POSTGRES_DB: yellow_loans
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yellow -d yellow_loans"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://yellow:yellow@db:5432/yellow_loans
      UPLOAD_DIR: /app/uploads
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "9000:9000"
    volumes:
      - ./frontend:/app
      - /app/node_modules 
    depends_on:
      - backend
    command: npx vite --port 9000 --host 0.0.0.0

volumes:
  postgres_data:
  uploads_data:
